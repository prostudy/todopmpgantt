<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>TodoPMP Gantt - OG Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  .og-container {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1a2332 0%, #2c3e50 100%);
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid pattern overlay */
  .og-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Decorative glow */
  .glow-top {
    position: absolute;
    top: -80px;
    right: 100px;
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(52,152,219,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute;
    bottom: -60px;
    left: 200px;
    width: 500px;
    height: 250px;
    background: radial-gradient(ellipse, rgba(226,168,75,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Left content area */
  .content-left {
    flex: 1;
    padding: 60px 50px 50px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .title {
    font-size: 58px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .subtitle {
    font-size: 26px;
    font-weight: 600;
    color: #e2a84b;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
  }

  .tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }

  .badges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .badge-blue {
    background: rgba(52,152,219,0.2);
    color: #5dade2;
    border: 1px solid rgba(52,152,219,0.35);
  }
  .badge-green {
    background: rgba(46,204,113,0.2);
    color: #58d68d;
    border: 1px solid rgba(46,204,113,0.35);
  }
  .badge-orange {
    background: rgba(243,156,18,0.2);
    color: #f5b041;
    border: 1px solid rgba(243,156,18,0.35);
  }
  .badge-purple {
    background: rgba(155,89,182,0.2);
    color: #bb8fce;
    border: 1px solid rgba(155,89,182,0.35);
  }
  .badge-gold {
    background: rgba(226,168,75,0.2);
    color: #e2a84b;
    border: 1px solid rgba(226,168,75,0.4);
  }

  /* Right Gantt chart area */
  .gantt-area {
    width: 480px;
    padding: 50px 50px 50px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .gantt-chart {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 28px 24px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }

  .gantt-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 0 10px 110px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .gantt-month {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 70px;
    text-align: center;
  }

  .gantt-row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    height: 32px;
  }

  .gantt-label {
    width: 110px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .gantt-track {
    flex: 1;
    height: 100%;
    position: relative;
  }

  .gantt-bar {
    position: absolute;
    height: 22px;
    top: 5px;
    border-radius: 4px;
    opacity: 0.9;
  }

  .bar-blue {
    background: linear-gradient(90deg, #2980b9, #3498db);
    box-shadow: 0 2px 8px rgba(52,152,219,0.3);
  }
  .bar-green {
    background: linear-gradient(90deg, #27ae60, #2ecc71);
    box-shadow: 0 2px 8px rgba(46,204,113,0.3);
  }
  .bar-orange {
    background: linear-gradient(90deg, #e67e22, #f39c12);
    box-shadow: 0 2px 8px rgba(243,156,18,0.3);
  }
  .bar-teal {
    background: linear-gradient(90deg, #16a085, #1abc9c);
    box-shadow: 0 2px 8px rgba(26,188,156,0.3);
  }
  .bar-red {
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    box-shadow: 0 2px 8px rgba(231,76,60,0.25);
  }
  .bar-purple {
    background: linear-gradient(90deg, #8e44ad, #9b59b6);
    box-shadow: 0 2px 8px rgba(155,89,182,0.25);
  }

  /* Critical path indicator */
  .critical {
    border: 2px solid rgba(231,76,60,0.6);
  }

  /* Diamond milestone */
  .milestone {
    position: absolute;
    width: 14px;
    height: 14px;
    top: 9px;
    background: #e2a84b;
    transform: rotate(45deg);
    border-radius: 2px;
    box-shadow: 0 2px 6px rgba(226,168,75,0.4);
  }

  /* Progress fill inside bar */
  .gantt-bar-progress {
    height: 100%;
    border-radius: 4px;
    opacity: 0.4;
    background: rgba(255,255,255,0.25);
  }

  /* Bottom branding */
  .branding {
    position: absolute;
    bottom: 30px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 2;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #e2a84b, #d4943a);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #1a2332;
    box-shadow: 0 2px 10px rgba(226,168,75,0.3);
  }

  .brand-url {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
  }

  .brand-dot {
    color: #e2a84b;
  }

  /* Vertical separator line */
  .separator {
    position: absolute;
    left: 50%;
    top: 15%;
    bottom: 15%;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.06), transparent);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="og-container">
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="separator"></div>

  <!-- Left: Text content -->
  <div class="content-left">
    <div class="title">TodoPMP Gantt</div>
    <div class="subtitle">Cronograma Profesional Gratuito</div>
    <div class="tagline">Ruta Cr&iacute;tica &middot; Valor Ganado &middot; Gesti&oacute;n de Recursos</div>
    <div class="badges">
      <span class="badge badge-blue">CPM</span>
      <span class="badge badge-green">EVM</span>
      <span class="badge badge-purple">WBS</span>
      <span class="badge badge-orange">CSV</span>
      <span class="badge badge-gold">Gratuito</span>
    </div>
  </div>

  <!-- Right: Gantt chart visual -->
  <div class="gantt-area">
    <div class="gantt-chart">
      <div class="gantt-header">
        <span class="gantt-month">Ene</span>
        <span class="gantt-month">Feb</span>
        <span class="gantt-month">Mar</span>
        <span class="gantt-month">Abr</span>
      </div>

      <!-- Row 1 -->
      <div class="gantt-row">
        <span class="gantt-label">Inicio</span>
        <div class="gantt-track">
          <div class="gantt-bar bar-blue critical" style="left: 0%; width: 38%;">
            <div class="gantt-bar-progress" style="width: 100%;"></div>
          </div>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="gantt-row">
        <span class="gantt-label">Planificaci&oacute;n</span>
        <div class="gantt-track">
          <div class="gantt-bar bar-green" style="left: 15%; width: 35%;">
            <div class="gantt-bar-progress" style="width: 70%;"></div>
          </div>
        </div>
      </div>

      <!-- Row 3 -->
      <div class="gantt-row">
        <span class="gantt-label">Ejecuci&oacute;n</span>
        <div class="gantt-track">
          <div class="gantt-bar bar-orange critical" style="left: 30%; width: 45%;">
            <div class="gantt-bar-progress" style="width: 40%;"></div>
          </div>
        </div>
      </div>

      <!-- Row 4 -->
      <div class="gantt-row">
        <span class="gantt-label">Monitoreo</span>
        <div class="gantt-track">
          <div class="gantt-bar bar-teal" style="left: 45%; width: 40%;">
            <div class="gantt-bar-progress" style="width: 20%;"></div>
          </div>
        </div>
      </div>

      <!-- Row 5 -->
      <div class="gantt-row">
        <span class="gantt-label">Control</span>
        <div class="gantt-track">
          <div class="gantt-bar bar-purple" style="left: 55%; width: 30%;">
          </div>
        </div>
      </div>

      <!-- Row 6: Milestone -->
      <div class="gantt-row">
        <span class="gantt-label">Cierre</span>
        <div class="gantt-track">
          <div class="milestone" style="left: 88%;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom branding -->
  <div class="branding">
    <div class="brand-icon">G</div>
    <span class="brand-url">todopmp<span class="brand-dot">.</span>com</span>
  </div>
</div>
</body>
</html>
